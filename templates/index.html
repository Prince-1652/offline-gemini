<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Gemini</title>
    <link rel="icon" type="image/png" href="/static/icons/gemini.png">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div id="layout">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="toggle-sidebar" class="icon-btn">
                    <img src="/static/icons/menu.svg" class="icon" alt="Menu" />
                </button>
                <button id="new-chat-btn" class="new-chat-btn">
                    <span>+ New Chat</span>
                </button>
            </div>
            <div id="chat-list" class="chat-list">
            </div>
            <div class="sidebar-footer">
                <button id="settings-btn" class="sidebar-action-btn">
                    <img src="/static/icons/settings.svg" class="icon" alt="Settings" />
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <main id="main-content">
            <header class="main-header">
                <button id="toggle-sidebar-mobile" class="icon-btn mobile-only">
                    <img src="/static/icons/menu.svg" class="icon" alt="Menu" />
                </button>
                <div class="header-title">Chat</div>
            </header>

            <div id="chat-container">
                <div id="welcome-message" class="welcome-message">
                    <h1>How can I help you today?</h1>
                </div>
                <div id="messages">
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <div class="input-row">
                        <textarea id="message-input" placeholder="Enter a prompt here..." rows="1"></textarea>
                        <button id="send-btn" class="icon-btn send-btn" disabled>
                            <img src="/static/icons/send.svg" class="icon" alt="Send" />
                        </button>
                    </div>
                    <div class="model-selector-container">
                        <button id="model-selector-btn" class="model-selector-btn">
                            <span id="current-model-name">llama3:8b</span>
                            <svg class="dropdown-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                <path d="M7 10l5 5 5-5z" />
                            </svg>
                        </button>
                        <div id="model-list" class="model-list hidden">
                            <!-- Models will be populated here -->
                            <div class="model-item loading-models">Loading models...</div>
                        </div>
                    </div>
                </div>
                <div class="footer-text">Ollama Gemini • Offline Mode</div>
            </div>
        </main>
    </div>

    <div id="error-toast" class="toast hidden"></div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>User Settings</h2>
                <button id="close-settings-btn" class="icon-btn">
                    <img src="/static/icons/x.svg" class="icon" alt="Close" />
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="user-name">Name</label>
                    <input type="text" id="user-name" placeholder="Enter your name" />
                </div>
                <div class="form-group">
                    <label for="custom-instructions">Custom Instructions</label>
                    <textarea id="custom-instructions" rows="4"
                        placeholder="e.g. give short and direct answers"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-settings-btn" class="secondary-btn">Cancel</button>
                <button id="save-settings-btn" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
